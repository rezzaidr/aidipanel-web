# AidiPanel landing page asset cache
# Put these locations inside the server { ... } block for aidipanel.com.
# CSS/JS filenames are content-hashed, so they are safe to cache aggressively.

location ~* \.(?:css|js|mjs|woff2|svg|png|jpg|jpeg|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    access_log off;
}

# Keep HTML fresh so new hashed CSS/JS filenames are picked up immediately.
location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
}

# Optional: if index.html is served for /
location = / {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
}
