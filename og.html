<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AidiPanel OG card</title>
<style>
@font-face{font-family:'Space Grotesk';font-weight:700;font-display:block;src:url('./assets/fonts/space-grotesk-700.woff2') format('woff2')}
@font-face{font-family:'Space Grotesk';font-weight:600;font-display:block;src:url('./assets/fonts/space-grotesk-600.woff2') format('woff2')}
@font-face{font-family:'Plus Jakarta Sans';font-weight:500;font-display:block;src:url('./assets/fonts/plus-jakarta-sans-500.woff2') format('woff2')}
@font-face{font-family:'JetBrains Mono';font-weight:600;font-display:block;src:url('./assets/fonts/jetbrains-mono-600.woff2') format('woff2')}
*{margin:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
body{position:relative;background:#0a0c12;color:#e9eaf1;font-family:'Plus Jakarta Sans',system-ui,sans-serif;padding:84px 90px;display:flex;flex-direction:column;justify-content:center}
.glow{position:absolute;top:-160px;right:-120px;width:760px;height:560px;background:radial-gradient(45% 50% at 60% 40%,rgba(80,72,229,.30),transparent 70%);filter:blur(40px);pointer-events:none}
.glow2{position:absolute;bottom:-220px;left:-120px;width:640px;height:520px;background:radial-gradient(45% 50% at 40% 50%,rgba(34,211,238,.16),transparent 70%);filter:blur(40px);pointer-events:none}
.dots{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.035) 1px,transparent 1px);background-size:34px 34px;pointer-events:none}
.brand{position:relative;display:flex;align-items:center;gap:16px;margin-bottom:42px}
.logo{width:62px;height:62px;border-radius:16px;background:linear-gradient(135deg,#5048e5,#322C7A);display:grid;place-items:center}
.logo svg{width:34px;height:34px;stroke:#fff;fill:none}
.wm{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:34px;letter-spacing:-.01em}
h1{position:relative;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:74px;line-height:1.02;letter-spacing:-.03em;max-width:18ch}
h1 .hl{color:#22d3ee}
.sub{position:relative;margin-top:24px;font-size:24px;color:#bcc0cd;max-width:42ch;line-height:1.4}
.cmd{position:relative;margin-top:38px;display:inline-flex;align-items:center;gap:14px;background:#12141d;border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:18px 22px;width:max-content}
.cmd .pr{color:#22d3ee;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:22px}
.cmd code{font-family:'JetBrains Mono',monospace;font-size:22px;color:#e9eaf1}
.chips{position:relative;margin-top:34px;display:flex;gap:12px}
.chip{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:18px;color:#9398a8;background:#12141d;border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:11px 17px}
</style>
</head>
<body>
  <div class="glow"></div><div class="glow2"></div><div class="dots"></div>
  <div class="brand">
    <span class="logo"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M2 19 L12 4 L22 19"/><circle cx="12" cy="19" r="2.2" fill="#fff" stroke="none"/></svg></span>
    <span class="wm">AidiPanel</span>
  </div>
  <h1>Manage <span class="hl">fast</span> LEMP sites without the bloat.</h1>
  <p class="sub">A performance-first, open-source control panel for your own Ubuntu or Debian server.</p>
  <div class="cmd"><span class="pr">$</span><code>curl -fsSL https://get.aidipanel.com | sudo bash</code></div>
  <div class="chips"><span class="chip">nginx</span><span class="chip">PHP</span><span class="chip">MariaDB</span><span class="chip">Redis</span></div>
</body>
</html>
